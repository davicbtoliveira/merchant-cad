services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: merchant_cad
      POSTGRES_USER: merchant_cad
      POSTGRES_PASSWORD: merchant_cad
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merchant_cad"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    restart: on-failure
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: merchant_cad
      POSTGRES_USER: merchant_cad
      POSTGRES_PASSWORD: merchant_cad
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
